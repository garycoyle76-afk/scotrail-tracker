<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScotRail Bulletproof Tracker</title>
    <style>
        :root { --sr-blue: #003087; --sr-gold: #C5A059; --sr-red: #D32F2F; --sr-grey: #666; }
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 15px; }
        
        /* Search Bar */
        .search-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .results { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }

        /* 10 Journey Slots */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .slot { 
            background: white; border-left: 5px solid var(--sr-blue); border-radius: 8px; 
            padding: 12px; min-height: 80px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .slot.empty { border-left-color: #ccc; border-style: dashed; opacity: 0.5; }
        .slot-title { font-size: 11px; color: var(--sr-blue); font-weight: bold; margin-bottom: 5px; }
        .clear { position: absolute; top: 5px; right: 5px; border: none; background: none; color: var(--sr-red); font-weight: bold; padding: 5px; cursor: pointer; }

        /* Floating Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; padding: 25px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-gold { background: var(--sr-gold); color: white; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="stationInput" placeholder="Enter Station Code (e.g. CYK)" maxlength="3">
        <div id="results" class="results"></div>
    </div>

    <div class="grid" id="journeyGrid"></div>

    <div id="detailOverlay" class="overlay">
        <button onclick="closeOverlay()" style="float:right; border:none; background:none; font-size: 24px;">×</button>
        <h2 id="oTitle">Journey Detail</h2>
        <div id="oContent"></div>
        <button class="btn btn-gold" onclick="fetchHistory()">Run Historical Audit (Rockshore)</button>
        <div id="oHistory" style="margin-top:20px; font-size: 14px;"></div>
        <button class="btn" style="background:#eee;" onclick="closeOverlay()">Back to Slots</button>
    </div>

    <script>
        let slots = JSON.parse(localStorage.getItem('sr_slots')) || new Array(10).fill(null);
        let currentRID = null;

        // Auto-Trigger Search
        document.getElementById('stationInput').addEventListener('input', async (e) => {
            const val = e.target.value.toUpperCase();
            if (val.length === 3) {
                const res = await fetch('https://scotrail-bridge.vercel.app/api/darwin', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ crs: val })
                });
                const data = await res.json();
                renderResults(data.services || []);
            }
        });

        function renderResults(services) {
            const container = document.getElementById('results');
            container.innerHTML = services.length ? '' : 'No ScotRail services.';
            services.slice(0, 5).forEach(s => {
                const div = document.createElement('div');
                div.className = 'res-item';
                div.innerHTML = `<div><strong>${s.std}</strong> to ${s.destination}</div><span>${s.etd}</span>`;
                div.onclick = () => saveToSlot(s);
                container.appendChild(div);
            });
        }

        function saveToSlot(s) {
            const idx = slots.findIndex(slot => slot === null);
            if (idx !== -1) {
                slots[idx] = { title: `${s.std} to ${s.destination}`, rid: s.rid, status: s.etd };
                localStorage.setItem('sr_slots', JSON.stringify(slots));
                document.getElementById('stationInput').value = '';
                document.getElementById('results').innerHTML = '';
                renderGrid();
            }
        }

        function renderGrid() {
            const grid = document.getElementById('journeyGrid');
            grid.innerHTML = slots.map((s, i) => `
                <div class="slot ${s ? '' : 'empty'}" onclick="${s ? `openOverlay(${i})` : ''}">
                    <div class="slot-title">SLOT ${i+1}</div>
                    ${s ? `<button class="clear" onclick="clearSlot(event, ${i})">×</button><strong>${s.title}</strong><br><small>${s.status}</small>` : 'Empty'}
                </div>
            `).join('');
        }

        function openOverlay(i) {
            const s = slots[i];
            currentRID = s.rid;
            document.getElementById('detailOverlay').style.display = 'block';
            document.getElementById('oTitle').innerText = s.title;
            document.getElementById('oContent').innerHTML = `<p>RID: ${s.rid}</p><p>Live: ${s.status}</p>`;
            document.getElementById('oHistory').innerHTML = '';
        }

        async function fetchHistory() {
            document.getElementById('oHistory').innerHTML = "Fetching Performance Audit...";
            const res = await fetch('https://scotrail-bridge.vercel.app/api/rockshore', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rid: currentRID })
            });
            const data = await res.json();
            document.getElementById('oHistory').innerHTML = data.serviceDetails.locations.map(l => 
                `<div>${l.location}: Plan ${l.gbtt_pta || 'Start'} | Actual ${l.actual_pta || 'TBC'}</div>`
            ).join('');
        }

        function clearSlot(e, i) { e.stopPropagation(); slots[i] = null; localStorage.setItem('sr_slots', JSON.stringify(slots)); renderGrid(); }
        function closeOverlay() { document.getElementById('detailOverlay').style.display = 'none'; }
        renderGrid();
    </script>
</body>
</html>
